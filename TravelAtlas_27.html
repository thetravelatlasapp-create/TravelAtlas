*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}

function parseAIJson(text){
 try{
  const fenced=text.match(/```json\s*([\s\S]*?)\s*```/i);
  if(fenced)return JSON.parse(fenced[1].trim());

  const startObj=text.indexOf("{");
  const startArr=text.indexOf("[");
  let start=-1;
  if(startObj===-1)start=startArr;
  else if(startArr===-1)start=startObj;
  else start=Math.min(startObj,startArr);

  if(start!==-1){
   const endObj=text.lastIndexOf("}");
   const endArr=text.lastIndexOf("]");
   const end=Math.max(endObj,endArr);
   if(end>start)return JSON.parse(text.slice(start,end+1).trim());
  }

  return JSON.parse(text.trim());
 }catch(e){
  console.error("Claude returned invalid JSON:", text);
  throw new Error("Claude returned invalid JSON");
 }
}

// HELPERS 
function fmt(d){if(!d)return"";const s=new Date(d+"T00:00:00");return s.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function diffDays(a,b){if(!a||!b)return 0;return Math.max(0,Math.round((new Date(b)-new Date(a))/(1000*86400)));}
function budgetColor(b){return b==="Budget"?{bg:"#111",c:"#888"}:b==="Expensive"?{bg:"#1a1a1a",c:"#fff"}:{bg:"#141414",c:"#aaa"};}
function chipStyle(bg,color){return{display:"inline-block",padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:500,background:bg,color,marginRight:6,marginBottom:6};}
function detectHub(from){if(!from)return"US";const f=from.toLowerCase();if(/(uk|london|paris|berlin|rome|madrid|amsterdam|europe)/.test(f))return"EU";if(/(australia|sydney|melbourne)/.test(f))return"AU";if(/(asia|singapore|beijing|tokyo|bangkok)/.test(f))return"AS";if(/(brazil|argentina|latin|south america)/.test(f))return"LA";return"US";}
function budgetMatch(b,sel){const map={"$0-$50/day":["ultrabudget","budget"],"$50-$100/day":["budget","midrange"],"$100-$200/day":["midrange","expensive"],"$200+/day":["expensive","luxury"]};return(map[sel]||[]).some(x=>b.includes(x));}

// LOCATION-SPECIFIC ACTIVITY ENGINE 
function getLocationActs(destination, dayIdx){
 const dest=(destination||"").toLowerCase();
 let country=null,city=null;
 for(const c of WD){
 if(dest.includes(c.c.toLowerCase())){country=c;break;}
 for(const ct of c.cities){if(dest.includes(ct.toLowerCase())){country=c;city=ct;break;}}
 if(country)break;
 }
 const slots=[{time:"8:30 AM",slot:"morning"},{time:"12:30 PM",slot:"midday"},{time:"3:00 PM",slot:"afternoon"},{time:"7:00 PM",slot:"evening"}];
 if(!country){
 const idx=dayIdx%14;
 return slots.map(({time,slot})=>{const a=DAY_ACTS[slot][idx];return{id:`${dayIdx}-${slot}`,time,slot,name:a.name,desc:a.desc,status:"pending"};});
 }
 const cd=CD[country.c];
 const mainCity=city||country.cities[0]||country.cap;
 const lm=cd?.landmarks||[]; const foods=cd?.foods||[];
 const acts=buildLocationActs(country,cd,mainCity,lm,foods,dayIdx);
 return slots.map(({time,slot},i)=>({id:`${dayIdx}-${slot}`,time,slot,name:acts[i].name,desc:acts[i].desc,status:"pending"}));
}

function buildLocationActs(country,cd,city,lm,foods,dayIdx){
 const c=country.c;const rot=n=>lm[dayIdx%Math.max(n,lm.length)]||lm[0]||`${city} historic district`;
 const rotF=n=>foods[dayIdx%Math.max(n,foods.length)]||foods[0]||"local specialty";
 const landmark1=lm[dayIdx%Math.max(1,lm.length)]||(city+" landmark");
 const landmark2=lm[(dayIdx+2)%Math.max(1,lm.length)]||(city+" old town");
 const food1=foods[dayIdx%Math.max(1,foods.length)]||(cd?.foods?.[0]||"local dish");
 const food2=foods[(dayIdx+1)%Math.max(1,foods.length)]||food1;
 const bestTime=cd?.bestTime||"";
 const climate=cd?.climate||"";
 return[
 {name:`Early Visit: ${landmark1.split(",")[0]}`,desc:`Head out at dawn to explore ${landmark1.split(",")[0]} before crowds arrive. ${bestTime?`Best visited during ${bestTime}.`:""} Allow 1.5-2 hours.`},
 {name:`Lunch: Try ${food1} in ${city}`,desc:`Seek out a well-regarded local spot serving authentic ${food1} , a signature dish of ${c}. Ask your hotel for their current recommendation in ${city}.`},
 {name:`Afternoon at ${landmark2.split(",")[0]}`,desc:`Spend the afternoon at ${landmark2.split(",")[0]}. ${climate?`Dress appropriately for the ${climate.toLowerCase().split(",")[0]} climate.`:""} Allow 2-3 hours.`},
 {name:`Evening: ${food2} Dinner in ${city}`,desc:`End the day with a ${food2} dinner at a restaurant in ${city}'s dining district. For ${c}, evenings are a highlight of the cultural experience.`}
 ];
}

   const{data,error}=await sb.auth.signInWithPassword({email,password:pass});

function PackingListSection({trip}){
 const storageKey='ta_packing_'+trip.id;
 const [items,setItems]=useState(()=>{try{const s=localStorage.getItem(storageKey);return s?JSON.parse(s):[];}catch(e){return[];}});
 const [loading,setLoading]=useState(false);
 const [open,setOpen]=useState(false);
 const [newItem,setNewItem]=useState("");

 useEffect(()=>{try{localStorage.setItem(storageKey,JSON.stringify(items));}catch(e){}}, [items]);

 const CATEGORIES=["Clothing","Toiletries","Documents","Electronics","Health","Activities","Food & Snacks","Misc"];

 const generateList=async()=>{
  setLoading(true);
  const days=diffDays(trip.start,trip.end)||7;
  const prompt=`You are a smart travel packing assistant. Generate a context-aware packing list for this trip:
Destination: ${trip.dest}
Duration: ${days} days
Trip type: ${trip.type||"leisure"}
Budget level: ${trip.budget?`$${trip.budget}/day`:"moderate"}
Travelers: ${trip.travelers||1}

Return ONLY a JSON array (no markdown, no explanation) of objects with this exact shape:
[{"category":"Clothing","item":"T-shirts (3)"},{"category":"Documents","item":"Passport"},...]

Categories to use: ${CATEGORIES.join(", ")}
Generate 25-35 practical, specific items tailored to the destination and trip type. Consider the climate of ${trip.dest} and any activities typical there.`;
  try{
   const text=await askAI(prompt,"You are a smart travel packing assistant. Return only valid JSON. No markdown. No explanation. Output must be parseable by JSON.parse.");
   if(!text)throw new Error("AI unavailable");
   const parsed=parseAIJson(text);
   const withState=parsed.map((it,i)=>({...it,id:Date.now()+i,checked:false}));
   setItems(withState);
  }catch(e){
   console.error("Packing AI error:",e);
   if(e.message==="Pro subscription required"){
    alert("AI features require a TravelAtlas Pro subscription. Upgrade to Pro to unlock packing lists, activity suggestions, and more!");
   }
  }
  setLoading(false);
 };

 const toggle=(id)=>setItems(its=>its.map(it=>it.id===id?{...it,checked:!it.checked}:it));
 const remove=(id)=>setItems(its=>its.filter(it=>it.id!==id));
 const addCustom=()=>{
  if(!newItem.trim())return;
  setItems(its=>[...its,{id:Date.now(),category:"Misc",item:newItem.trim(),checked:false}]);
  setNewItem("");
 };
 const clearChecked=()=>setItems(its=>its.filter(it=>!it.checked));
 const resetAll=()=>setItems([]);

 const grouped=CATEGORIES.reduce((acc,cat)=>{
  const catItems=items.filter(it=>it.category===cat);
  if(catItems.length>0)acc[cat]=catItems;
  return acc;
 },{});
 const checkedCount=items.filter(it=>it.checked).length;
 const totalCount=items.length;
 const pct=totalCount>0?Math.round((checkedCount/totalCount)*100):0;

 return(
  <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,marginBottom:16,overflow:"hidden"}}>

    <div style={{display:"flex",alignItems:"center",gap:10}}>
     <div style={{background:T.tealL,border:`1px solid ${T.tealM}`,borderRadius:7,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🧳</div>
     <div>
      <div style={{fontWeight:600,fontSize:14,color:T.text}}>Smart Packing List</div>
      {totalCount>0&&<div style={{fontSize:11,color:T.text3}}>{checkedCount}/{totalCount} packed ({pct}%)</div>}
      {totalCount===0&&<div style={{fontSize:11,color:T.text3}}>AI-generated for {trip.dest}</div>}
     </div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:9}}>
     {totalCount>0&&(
      <div style={{width:60,height:5,background:T.bg3,borderRadius:99,overflow:"hidden"}}>
       <div style={{width:`${pct}%`,height:"100%",background:T.teal,borderRadius:99,transition:"width .4s"}}/>
      </div>
     )}
     <span style={{color:T.text3,fontSize:14}}>{open?"▲":"▼"}</span>
    </div>
   </div>

   {open&&(
    <div style={{padding:"0 18px 18px",borderTop:`1px solid ${T.border}`}}>
     {/* Generate button */}
     <div style={{display:"flex",gap:9,marginTop:14,marginBottom:16,flexWrap:"wrap"}}>
      <button onClick={generateList} disabled={loading} style={{background:loading?"#111":T.teal,color:loading?T.text3:"#000",border:`1px solid ${loading?T.border:T.teal}`,borderRadius:8,padding:"9px 18px",fontSize:12,fontWeight:700,cursor:loading?"not-allowed":"pointer",fontFamily:T.sans,display:"flex",alignItems:"center",gap:7,transition:"all .2s"}}>
       {loading?(<><span style={{animation:"pulse 1s infinite",display:"inline-block"}}>●</span> Generating...</>):(<>✦ {totalCount>0?"Regenerate List":"Generate Packing List"}</>)}
      </button>
      {totalCount>0&&checkedCount>0&&<button onClick={clearChecked} style={{background:"none",border:`1px solid ${T.border}`,color:T.text2,borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer",fontFamily:T.sans}}>Clear Packed</button>}
      {totalCount>0&&<button onClick={resetAll} style={{background:"none",border:`1px solid ${T.border}`,color:T.text3,borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer",fontFamily:T.sans}}>Reset</button>}
     </div>

     {/* Empty state */}
     {totalCount===0&&!loading&&(
      <div style={{textAlign:"center",padding:"24px 0",color:T.text3,fontSize:13}}>
       <div style={{fontSize:32,marginBottom:8}}>🧳</div>
       <div>Click "Generate Packing List" to get a smart,</div>
       <div>AI-tailored list for {trip.dest}.</div>
      </div>
     )}

     {/* Category groups */}
     {Object.entries(grouped).map(([cat,catItems])=>(
      <div key={cat} style={{marginBottom:14}}>
       <div style={{fontSize:10,fontWeight:700,color:T.text3,textTransform:"uppercase",letterSpacing:.8,marginBottom:7,paddingBottom:5,borderBottom:`1px solid ${T.border}`}}>{cat}</div>
       {catItems.map(it=>(
        <div key={it.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 6px",borderRadius:7,cursor:"pointer",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background=T.bg3} onMouseLeave={e=>e.currentTarget.style.background=""}>
         <div onClick={()=>toggle(it.id)} style={{width:18,height:18,borderRadius:5,border:`1.5px solid ${it.checked?T.teal:T.border2}`,background:it.checked?T.teal:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"all .15s"}}>

        </div>
       ))}
      </div>
     ))}

     {/* Add custom item */}
     {totalCount>0&&(
      <div style={{display:"flex",gap:8,marginTop:14,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
       <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustom()} placeholder="Add a custom item..." style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,color:T.text,borderRadius:8,padding:"8px 12px",fontSize:13,fontFamily:T.sans,outline:"none"}}/>

function CountrySearchInput({val,onChange}){
 const [q,setQ]=useState("");
 const selected=Array.isArray(val)?val:[];
 const countries=WD.map(c=>c.c).sort();
 const filtered=q.length>0?countries.filter(c=>c.toLowerCase().includes(q.toLowerCase())&&!selected.includes(c)):[];
 const add=(c)=>{onChange([...selected,c]);setQ("");};
 const remove=(c)=>onChange(selected.filter(x=>x!==c));
 return(
  <div>
   <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
    {selected.map(c=>(
     <span key={c} style={{display:"inline-flex",alignItems:"center",gap:5,background:T.tealL,border:`1px solid ${T.tealM}`,borderRadius:99,padding:"3px 10px",fontSize:12,color:T.teal}}>
      {CD[c]?.flag||""} {c}
      <span onClick={()=>remove(c)} style={{cursor:"pointer",fontSize:14,lineHeight:1}}>x</span>
     </span>
    ))}
   </div>
   <div style={{position:"relative"}}>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Type a country name..." style={{...profInp,paddingLeft:12}}/>
    {filtered.length>0&&(
     <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#111",border:"1px solid #2a2a2a",borderRadius:9,zIndex:999,maxHeight:180,overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
      {filtered.slice(0,8).map(c=>(
       <div key={c} onClick={()=>add(c)} style={{padding:"9px 13px",fontSize:13,color:"#ccc",cursor:"pointer",display:"flex",alignItems:"center",gap:8}} onMouseEnter={e=>e.currentTarget.style.background="#1a1a1a"} onMouseLeave={e=>e.currentTarget.style.background=""}>
        <span>{CD[c]?.flag||""}</span><span>{c}</span>

    )}

  </div>
 );
}

// SUPABASE SYNC HELPERS
async function sbLoadTrips(userId){
 if(!sb||!userId)return null;
 try{
  const{data,error}=await sb.from('trips').select('*').eq('user_id',userId).order('created_at',{ascending:false});
  if(error)return null;
  return data.map(r=>({id:r.id,name:r.name,dest:r.dest,start:r.start,end:r.end_date,budget:r.budget,travelers:r.travelers,type:r.type,events:r.events||{},packingList:r.packing_list||[]}));
 }catch(e){return null;}
}
async function sbSaveTrip(userId,trip){
 if(!sb||!userId)return;
 try{
  await sb.from('trips').upsert({id:typeof trip.id==='number'?undefined:trip.id,user_id:userId,name:trip.name,dest:trip.dest,start:trip.start||null,end_date:trip.end||null,budget:trip.budget,travelers:trip.travelers,type:trip.type,events:trip.events||{},packing_list:trip.packingList||[]},{onConflict:'id'});
 }catch(e){console.warn('Trip save error:',e);}
}

 if(!sb||!userId||typeof tripId==='number')return;
 try{await sb.from('trips').delete().eq('id',tripId).eq('user_id',userId);}catch(e){}
}

 const [citExpanded,setCitExpanded]=useState(null);
 const [profile,setProfile]=useState(()=>{try{const s=localStorage.getItem('ta_profile');return s?JSON.parse(s):EMPTY_PROFILE;}catch(e){return EMPTY_PROFILE;}});
 const [winW,setWinW]=useState(window.innerWidth);
 useEffect(()=>{const h=()=>setWinW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);

 // Auto-save to localStorage (always, as cache)
 useEffect(()=>{try{localStorage.setItem('ta_trips',JSON.stringify(trips));}catch(e){}},[trips]);
 useEffect(()=>{try{localStorage.setItem('ta_done',JSON.stringify(doneTrips));}catch(e){}},[doneTrips]);
 useEffect(()=>{try{localStorage.setItem('ta_profile',JSON.stringify(profile));}catch(e){}},[profile]);

 // Load data from Supabase when user logs in
 const loadUserData=async(uid)=>{
  const [sbTrips,sbDone,sbProf]=await Promise.all([sbLoadTrips(uid),sbLoadDoneTrips(uid),sbLoadProfile(uid)]);
  if(sbTrips!==null){setTrips(sbTrips);localStorage.setItem('ta_trips',JSON.stringify(sbTrips));}
  if(sbDone!==null){setDoneTrips(sbDone);localStorage.setItem('ta_done',JSON.stringify(sbDone));}
  if(sbProf!==null){setProfile(p=>({...p,...sbProf}));localStorage.setItem('ta_profile',JSON.stringify({...profile,...sbProf}));}
 };

 // Check Supabase session on mount + listen for Google OAuth redirect
 useEffect(()=>{
  if(!sb)return;
  sb.auth.getSession().then(({data:{session}})=>{
   if(session?.user){
    setLoggedIn(true);
    setUserId(session.user.id);
    setUserName(session.user.user_metadata?.name||session.user.user_metadata?.full_name||session.user.email.split("@")[0]);
    if(session.access_token)setAuthToken(session.access_token);
    loadUserData(session.user.id);
   }
  }).catch(()=>{});
  // Listen for auth changes (catches Google OAuth redirect)
  const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
   if(event==="SIGNED_IN"&&session?.user){
    setLoggedIn(true);
    setUserId(session.user.id);
    setUserName(session.user.user_metadata?.name||session.user.user_metadata?.full_name||session.user.email.split("@")[0]);
    if(session.access_token)setAuthToken(session.access_token);
    await loadUserData(session.user.id);
   }
   if(event==="SIGNED_OUT"){
    setLoggedIn(false);setUserId(null);setUserName("");
    setTrips([]);setDoneTrips([]);setProfile(EMPTY_PROFILE);
   }
  });
  return()=>subscription.unsubscribe();
 },[]);

 // Supabase-aware trip actions
 const addTrip=async(trip)=>{
  const newTrip={id:Date.now(),...trip,days:[]};
  setTrips(ts=>[newTrip,...ts]);
  if(userId)await sbSaveTrip(userId,newTrip);
 };
 const removeTrip=async(id)=>{
  setTrips(ts=>ts.filter(t=>t.id!==id));
  if(userId)await sbDeleteTrip(userId,id);
 };
 const markDone=async(trip)=>{
  setTrips(ts=>ts.filter(t=>t.id!==trip.id));
  const doneTrip={...trip,rating:0};
  setDoneTrips(ts=>[doneTrip,...ts]);
  if(userId){await sbDeleteTrip(userId,trip.id);await sbSaveDoneTrip(userId,doneTrip);}
 };
 const saveProfile=async(newProfile)=>{
  setProfile(newProfile);
  if(userId)await sbSaveProfile(userId,newProfile);
 };

 const showNotif=(msg)=>{setNotifMsg(msg);setNotifShow(true);setTimeout(()=>setNotifShow(false),2800);};
 const closeModal=()=>setModal(null);

 const handleSignOut=async()=>{
  if(sb){try{await sb.auth.signOut();}catch(e){}}
  localStorage.removeItem('ta_user');
  setLoggedIn(false);setUserName("");setUserId(null);
  setTrips([]);setDoneTrips([]);setProfile(EMPTY_PROFILE);
 };

 const handleLoginSuccess=async(user,token)=>{
  setLoggedIn(true);
  setUserId(user.id);
  setUserName(user.user_metadata?.name||user.user_metadata?.full_name||user.email.split("@")[0]);
  setModal(null);
  if(token)setAuthToken(token);
  await loadUserData(user.id);
 };

 const renderPage=()=>{
 switch(page){
 case"home":return <HomePage setPage={setPage} setSelectedCountry={setSelectedCountry}/>;
 case"countries":return <CountriesPage cSearch={cSearch} setCSearch={setCSearch} cCont={cCont} setCCont={setCCont} cBudget={cBudget} setCBudget={setCBudget} cClimate={cClimate} setCClimate={setCClimate} cPage={cPage} setCPage={setCPage} setSelectedCountry={setSelectedCountry} setPage={setPage}/>;
 case"country":return selectedCountry?<CountryPage country={selectedCountry} setPage={setPage} showNotif={showNotif} setSelectedCountry={setSelectedCountry}/>:null;
 case"continents":return <ContinentsPage setPage={setPage} setSelectedCont={setSelectedCont}/>;
 case"contd":return selectedCont?<ContDetailPage cont={selectedCont} setPage={setPage} setSelectedCountry={setSelectedCountry}/>:null;
 case"regions":return <RegionsPage setPage={setPage} setSelectedRegion={setSelectedRegion}/>;
 case"regiond":return selectedRegion?<RegionDetailPage region={selectedRegion} setPage={setPage} setSelectedCountry={setSelectedCountry}/>:null;
 case"cities":return <CitiesPage citSearch={citSearch} setCitSearch={setCitSearch} citExpanded={citExpanded} setCitExpanded={setCitExpanded} setSelectedCountry={setSelectedCountry} setPage={setPage} setSelectedCity={c=>{setSelectedCity(c);setPage("cityd");}}/>;
 case"cityd":return selectedCity?<CityDetailPage city={selectedCity} setPage={setPage}/>:null;
 case"ai":return <AIPage aiForm={aiForm} setAiForm={setAiForm} aiResults={aiResults} setAiResults={setAiResults} setPage={setPage} setTripForm={setTripForm} setNewTripForm={setNewTripForm} showNotif={showNotif} profile={profile}/>;
 case"itin":return <ItinPage trips={trips} setTrips={setTrips} doneTrips={doneTrips} setDoneTrips={setDoneTrips} addTrip={addTrip} removeTrip={removeTrip} markDone={markDone} setSelectedTrip={setSelectedTrip} setPage={setPage} newTripForm={newTripForm} setNewTripForm={setNewTripForm} tripForm={tripForm} setTripForm={setTripForm} showNotif={showNotif}/>;
 case"tripd":return selectedTrip?<TripDetailPage trip={selectedTrip} setTrips={setTrips} setPage={setPage} showNotif={showNotif} userId={userId}/>:null;
 case"done":return <DonePage doneTrips={doneTrips} setDoneTrips={setDoneTrips} userId={userId}/>;
 case"profile":return <ProfilePage loggedIn={loggedIn} userName={userName} setModal={setModal} showNotif={showNotif} profile={profile} setProfile={saveProfile}/>;
 default:return null;
 }
 };

 return(
 <div style={{minHeight:"100vh",background:"#000"}}>
 {sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:199}}/>}
 <Sidebar page={page} setPage={setPage} open={sidebarOpen} onClose={()=>setSidebarOpen(false)} loggedIn={loggedIn} setModal={setModal} winW={winW}/>
 <div className="main-area" style={{marginLeft:winW>860?260:0,minHeight:"100vh",transition:"margin .3s",background:T.bg}}>
 <Topbar page={page} loggedIn={loggedIn} userName={userName} setModal={setModal} setLoggedIn={setLoggedIn} setUser={setUserName} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} winW={winW}/>
 <div style={{paddingTop:58}}>{renderPage()}</div>
 </div>
 {modal==="login"&&<LoginModal setModal={setModal} onLoginSuccess={handleLoginSuccess} showNotif={showNotif} onClose={closeModal}/>}
 {modal==="signup"&&<SignupModal setModal={setModal} onLoginSuccess={handleLoginSuccess} showNotif={showNotif} onClose={closeModal}/>}
 <Notif msg={notifMsg} show={notifShow}/>
 </div>
 );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<TravelAtlas/>);
} catch(globalErr) { console.error("GLOBAL ERROR:", globalErr.message, globalErr.stack); document.body.innerHTML = "<pre style=\"color:red;padding:20px\">" + globalErr.message + "\n" + globalErr.stack + "</pre>"; }
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>{
        console.log('SW registered');
        // Force check for updates immediately
        r.update();
        // Check for updates every 30 seconds
        setInterval(()=>r.update(), 30000);
      })
      .catch(e=>console.log('SW error:',e));
    // If a new SW is waiting, activate it immediately
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      window.location.reload();
    });
  });
}
</script>
